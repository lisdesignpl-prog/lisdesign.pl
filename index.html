<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LisDesign - profesjonalne projektowanie graficzne i strony internetowe.">
    <title>LisDesign | Projektowanie graficzne i strony internetowe</title>
    
    <link rel="stylesheet" href="css\global.css">
    <link rel="stylesheet" href="css\scroll.css">
    <link rel="stylesheet" href="css\buttons.css">
    <link rel="stylesheet" href="css\menu.css">
    <link rel="stylesheet" href="css\sections.css">
    <link rel="stylesheet" href="css\gallery-logo.css">
    <link rel="stylesheet" href="css\carusel.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Hind+Madurai:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>


    <header>
        <nav>

            <ul class="navigation" id="navigation-list">

                <li class="navigation__item">
                    <a href="#home" class="navigation__link">Strona Główna</a>
                </li>

                <li class="navigation__item">
                    <a href="#logo-gallery" class="navigation__link">Logotypy</a>
                </li>

                <li class="navigation__item">
                    <a href="#website-gallery" class="navigation__link">Strony Internetowe</a>
                </li>

                <li class="navigation__item">
                    <a href="#contact-form" class="navigation__link">Kontakt</a>
                </li>

            </ul>

            <div class="navigation__burger" id="burger">
                <div id="burger-line-1"></div>
                <div id="burger-line-2"></div>
                <div id="burger-line-3"></div>
            </div>

        </nav>
    </header>

    <div class="social-media">
        <div class="fb"><img src="layout\icons\fb.png" alt=""></div>
        <div class="ins"><img src="layout\icons\em.png" alt=""></div>
        <div class="mail"><img src="layout\icons\ph.png" alt=""></div>
    </div>

<div class="scroll-part">

    <section id="home">
        
        <div style="position: relative;">
            <div> 
                <img src="\layout\logo\LisDesign.png" alt="LisDesignLogo" srcset="">
                <h1>LisDesign.pl</h1>
    
            </div>

            <div class="button-position">
                <button class="orange-btn">Zobacz&nbsp;portfolio</button>
            </div>
        </div>
    </section>

    <section id="logo-gallery">

        <div class="container-100">
            <h2>Logotypy<span class="inline-block w-2 h-2 bg-white rounded-full ml-2"></span></h2>
            <div id="gallery__logo-container">
                Galeria - gallery.css
            </div>
        </div>
    
    </section>


    <section id="carusel-website background">
        
        <div>
            <h2>Strony Internetowe</h2>

            <div id="carusel__website-container">
                Karuzela - carusel.css
            </div>

            
        </div>

    </section>

    <section id="contact-form">

        <div>

            <div class="contact">
                <div>
                    <h2>O mnie</h2>
                </div>

                <div>
                    <h2>Kontakt</h2>
                    <form>
                        <label for="name">Imię</label><br>
                        <input id="name"  type="text"><br>

                        <label for="surname">Nazwisko</label><br>
                        <input id="surname" type="text"><br>
                        
                        <label for="email">E-mail kontaktowy</label><br>
                        <input name="email" type="email"><br>

                        <label for="message">Wiadomość</label><br>
                        <input id="message" type="text"><br>
                    </form>
                </div>
            </div>

            <footer>
                <p>&copy; 2025 LisDesign. Wszelkie prawa zastrzeżone.</p>
            </footer>

        </div>

    </section>
</div>

    <script src="js\LisDesign.js"></script>
    <script src="js\menu.js"></script>
    <script src="js\gallery.js"></script>
    <script src="js\carusel.js"></script>

    
</body>
</html>
